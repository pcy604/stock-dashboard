# 2단계(선택) — 매일 자동으로 데이터 생성 → 커밋 → 클라우드 자동 반영
# PC 없이도 데이터가 갱신된다. 기본은 'workflow_dispatch'(수동)만 켜두고,
# 안정적으로 돌면 schedule 주석을 풀어 자동화한다.
#
# 활성화 전 GitHub repo → Settings → Secrets and variables → Actions 에 등록:
#   FRED_KEY, (선택) TELEGRAM_TOKEN, TELEGRAM_CHAT_ID
name: daily-refresh

on:
  workflow_dispatch:        # 수동 실행 버튼
  # schedule:
  #   - cron: '0 21 * * 0-4'   # UTC 21시(한국 06시), 월~금 장 후. 검증되면 주석 해제

permissions:
  contents: write           # results/*.json 커밋 권한

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    env:
      FRED_KEY: ${{ secrets.FRED_KEY }}
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: 주봉 스크리너 + 페이퍼 트레이딩 자동기록
        run: python weekly_run.py
        continue-on-error: true

      - name: CANSLIM 갱신
        run: python canslim_run.py
        continue-on-error: true

      - name: 변경분 커밋 & 푸시
        run: |
          git config user.name  "github-actions"
          git config user.email "actions@github.com"
          git add results/*.json data/*.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "auto: 데이터 갱신 $(date -u +%Y-%m-%d)"
          git push
