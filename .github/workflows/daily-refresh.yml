# 매일 자동으로 데이터 생성 → 커밋 → Streamlit Cloud 자동 반영 (PC 불필요)
#
# 활성화 전 GitHub repo → Settings → Secrets and variables → Actions 에 등록:
#   FRED_KEY  (필수),  TELEGRAM_TOKEN · TELEGRAM_CHAT_ID (선택, 매도 알림용)
#
# 가벼운 라이브 갱신(주봉·월간·CANSLIM·섹터)은 매일.
# 무거운 캐시 기반(계절성·MDD)은 가격캐시가 repo에 없어 Actions에서 제외 →
# 로컬에서 가끔 `python screen_precompute.py`로 갱신.
name: daily-refresh

on:
  workflow_dispatch:          # 수동 실행 버튼
  schedule:
    - cron: '0 21 * * 0-4'    # UTC 21시 = 한국 06시, 월~금(장 마감 후)

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    env:
      FRED_KEY: ${{ secrets.FRED_KEY }}
      TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: 섹터 맵 갱신
        run: python sectors.py
        continue-on-error: true

      - name: 주봉 스크리너 + 페이퍼 트레이딩 자동기록
        run: python weekly_run.py
        continue-on-error: true

      - name: 월간 성과 갱신
        run: python perf_run.py
        continue-on-error: true

      - name: CANSLIM 갱신
        run: python canslim_run.py
        continue-on-error: true

      - name: 포트폴리오 모니터 + 매도 알림(텔레그램)
        run: python portfolio_monitor.py
        continue-on-error: true

      - name: 변경분 커밋 & 푸시
        run: |
          git config user.name  "github-actions"
          git config user.email "actions@github.com"
          git add results/*.json data/sectors.json data/portfolio.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "auto: 데이터 갱신 $(date -u +%Y-%m-%d)"
          git push
