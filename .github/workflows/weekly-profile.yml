# 주간 자동 — 계절성·MDD(종목 프로파일) 증분 갱신 (PC 불필요)
#
# 동작:
#   1) data/longcache(장기 종가)를 GitHub Actions 캐시에서 복원
#   2) screen_precompute.py 증분 실행 — 새로 생긴 날짜만 받아 append
#   3) results/seasonality.json·mdd.json 커밋 → Streamlit 자동 반영
#   4) longcache를 다시 캐시에 저장 (다음 주에 복원)
#
# 첫 1~2회는 longcache가 비어 있어 2008~ 전체를 받느라 느릴 수 있고,
# 타임아웃이 나도 받은 만큼 캐시에 저장돼 다음 주에 이어받아 자가치유됨.
# 주간(7일 내) 실행이라 Actions 캐시(7일 미사용 시 만료)가 항상 살아있음.
name: weekly-profile

on:
  workflow_dispatch:
  schedule:
    - cron: '0 22 * * 0'      # 일 22:00 UTC = 월 07:00 KST (주 1회)

permissions:
  contents: write

jobs:
  profile:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - run: pip install -r requirements.txt

      - name: 장기 종가 캐시 복원/저장 (증분 핵심)
        uses: actions/cache@v4
        with:
          path: data/longcache
          key: longcache-${{ github.run_id }}
          restore-keys: |
            longcache-

      - name: 계절성·MDD 증분 갱신
        run: python screen_precompute.py
        continue-on-error: true

      - name: 결과 커밋 & 푸시
        run: |
          git config user.name  "github-actions"
          git config user.email "actions@github.com"
          git add results/seasonality.json results/mdd.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "auto: 종목 프로파일 갱신 $(date -u +%Y-%m-%d)"
          git push
